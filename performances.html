<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performances — Razzberry Jam Live</title>
  <meta name="description" content="Live performance videos from Razzberry Jam, an indie rock band from Worcester, MA.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <div class="nav-wrap">
    <nav class="nav" aria-label="Main">
      <a class="wordmark" href="index.html">RAZZBERRY JAM</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="music.html">Music</a></li>
        <li><a href="performances.html" aria-current="page">Performances</a></li>
      </ul>
      <a class="btn btn-red" href="mailto:bandrazzberryjam@gmail.com">Book Us</a>
    </nav>
  </div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-stripes stripes" aria-hidden="true"></div>
    <div class="container">
      <span class="eyebrow">Razzberry Jam</span>
      <h1 class="display">Performances</h1>
    </div>
  </header>

  <!-- Videos -->
  <section style="padding-top: 0;">
    <div class="container">
      <div class="perf-grid">
        <video controls preload="none" playsinline poster="assets/perf-tinsel-2-poster.jpg">
          <source src="assets/perf-tinsel-2.mp4" type="video/mp4">
        </video>
        <video controls preload="none" playsinline poster="assets/perf-crowd-poster.jpg">
          <source src="assets/perf-crowd.mp4" type="video/mp4">
        </video>
        <video controls preload="none" playsinline poster="assets/perf-quad-poster.jpg">
          <source src="assets/perf-quad.mp4" type="video/mp4">
        </video>
        <video controls preload="none" playsinline poster="assets/perf-backyard-night-poster.jpg">
          <source src="assets/perf-backyard-night.mp4" type="video/mp4">
        </video>
        <video controls preload="none" playsinline poster="assets/perf-room-wide-poster.jpg">
          <source src="assets/perf-room-wide.mp4" type="video/mp4">
        </video>
        <video class="vertical" controls preload="none" playsinline poster="assets/perf-garage-poster.jpg">
          <source src="assets/perf-garage.mp4" type="video/mp4">
        </video>
        <video class="wide" controls preload="none" playsinline poster="assets/perf-room-2-poster.jpg">
          <source src="assets/perf-room-2.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <img class="footer-logo" src="assets/logo.png" alt="Razzberry Jam logo">
      <div class="meta">
        <span>Indie rock from Worcester, MA <span class="tick">&#9642;</span></span>
        <a href="mailto:bandrazzberryjam@gmail.com">Booking: bandrazzberryjam@gmail.com</a>
        <a href="https://open.spotify.com/artist/3LFaPOnIZ1qrPua2B89dBh">Spotify</a>
        <a href="https://instagram.com/razzberryjam.band">Instagram @razzberryjam.band</a>
        <a href="https://linktr.ee/razzberryjam">Linktree</a>
      </div>
    </div>
  </footer>

  <!-- Sticky booking bar -->
  <div class="booking-bar" id="bookingBar">
    <a href="mailto:bandrazzberryjam@gmail.com">Booking: bandrazzberryjam@gmail.com</a>
    <button aria-label="Dismiss" onclick="document.getElementById('bookingBar').remove()">&times;</button>
  </div>

</body>
</html>
